name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  BINARY_NAME: qd2
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_suffix: linux-arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_suffix: macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libpixman-1-dev pkg-config

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gtk4 pixman pkgconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          package_dir="${BINARY_NAME}-${version}-${{ matrix.asset_suffix }}"
          mkdir -p "dist/${package_dir}"

          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${package_dir}/"
          cp README.md "dist/${package_dir}/"

          tar -C dist -czf "dist/${package_dir}.tar.gz" "${package_dir}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create GitHub release shell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --notes ""
          fi

      - name: Generate changelog with changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx changelogithub

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
